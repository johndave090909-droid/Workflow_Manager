<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 200 200">
  <defs>
    <pattern id="fiji" width="200" height="200" patternUnits="userSpaceOnUse">

      <!-- Base -->
      <rect width="200" height="200" fill="#120b04"/>

      <!-- ── Panel borders (outer frame lines) ── -->
      <!-- Top-left panel -->
      <rect x="3" y="3" width="88" height="88" fill="#3d1508" stroke="#c49232" stroke-width="2"/>
      <!-- inner double border -->
      <rect x="9" y="9" width="76" height="76" fill="none" stroke="#c49232" stroke-width="0.8"/>

      <!-- Top-right panel -->
      <rect x="109" y="3" width="88" height="88" fill="#3d1508" stroke="#c49232" stroke-width="2"/>
      <rect x="115" y="9" width="76" height="76" fill="none" stroke="#c49232" stroke-width="0.8"/>

      <!-- Bottom-left panel -->
      <rect x="3" y="109" width="88" height="88" fill="#3d1508" stroke="#c49232" stroke-width="2"/>
      <rect x="9" y="115" width="76" height="76" fill="none" stroke="#c49232" stroke-width="0.8"/>

      <!-- Bottom-right panel -->
      <rect x="109" y="109" width="88" height="88" fill="#3d1508" stroke="#c49232" stroke-width="2"/>
      <rect x="115" y="115" width="76" height="76" fill="none" stroke="#c49232" stroke-width="0.8"/>

      <!-- ── Flower motif: top-left (center 47,47) ── -->
      <ellipse cx="47" cy="27" rx="9"  ry="15" fill="#cfa040"/>
      <ellipse cx="47" cy="67" rx="9"  ry="15" fill="#cfa040"/>
      <ellipse cx="27" cy="47" rx="15" ry="9"  fill="#cfa040"/>
      <ellipse cx="67" cy="47" rx="15" ry="9"  fill="#cfa040"/>
      <circle  cx="47" cy="47" r="9"  fill="#120b04"/>
      <circle  cx="47" cy="47" r="5"  fill="#cfa040"/>
      <circle  cx="47" cy="47" r="2"  fill="#120b04"/>

      <!-- ── Flower motif: top-right (center 153,47) ── -->
      <ellipse cx="153" cy="27" rx="9"  ry="15" fill="#cfa040"/>
      <ellipse cx="153" cy="67" rx="9"  ry="15" fill="#cfa040"/>
      <ellipse cx="133" cy="47" rx="15" ry="9"  fill="#cfa040"/>
      <ellipse cx="173" cy="47" rx="15" ry="9"  fill="#cfa040"/>
      <circle  cx="153" cy="47" r="9"  fill="#120b04"/>
      <circle  cx="153" cy="47" r="5"  fill="#cfa040"/>
      <circle  cx="153" cy="47" r="2"  fill="#120b04"/>

      <!-- ── Flower motif: bottom-left (center 47,153) ── -->
      <ellipse cx="47" cy="133" rx="9"  ry="15" fill="#cfa040"/>
      <ellipse cx="47" cy="173" rx="9"  ry="15" fill="#cfa040"/>
      <ellipse cx="27" cy="153" rx="15" ry="9"  fill="#cfa040"/>
      <ellipse cx="67" cy="153" rx="15" ry="9"  fill="#cfa040"/>
      <circle  cx="47" cy="153" r="9"  fill="#120b04"/>
      <circle  cx="47" cy="153" r="5"  fill="#cfa040"/>
      <circle  cx="47" cy="153" r="2"  fill="#120b04"/>

      <!-- ── Flower motif: bottom-right (center 153,153) ── -->
      <ellipse cx="153" cy="133" rx="9"  ry="15" fill="#cfa040"/>
      <ellipse cx="153" cy="173" rx="9"  ry="15" fill="#cfa040"/>
      <ellipse cx="133" cy="153" rx="15" ry="9"  fill="#cfa040"/>
      <ellipse cx="173" cy="153" rx="15" ry="9"  fill="#cfa040"/>
      <circle  cx="153" cy="153" r="9"  fill="#120b04"/>
      <circle  cx="153" cy="153" r="5"  fill="#cfa040"/>
      <circle  cx="153" cy="153" r="2"  fill="#120b04"/>

      <!-- ── Vertical center band (x 95–105) — diamonds ── -->
      <polygon points="100,5  104,13 100,21  96,13"  fill="#cfa040"/>
      <polygon points="100,23 104,31 100,39  96,31"  fill="#cfa040"/>
      <polygon points="100,41 104,49 100,57  96,49"  fill="#cfa040"/>
      <polygon points="100,59 104,67 100,75  96,67"  fill="#cfa040"/>
      <polygon points="100,77 104,85 100,93  96,85"  fill="#cfa040"/>
      <!-- centre cross diamond -->
      <polygon points="100,92 112,100 100,108 88,100" fill="#cfa040"/>
      <rect x="96" y="96" width="8" height="8" fill="#120b04" transform="rotate(45 100 100)"/>
      <polygon points="100,107 104,115 100,123 96,115" fill="#cfa040"/>
      <polygon points="100,125 104,133 100,141 96,133" fill="#cfa040"/>
      <polygon points="100,143 104,151 100,159 96,151" fill="#cfa040"/>
      <polygon points="100,161 104,169 100,177 96,169" fill="#cfa040"/>
      <polygon points="100,179 104,187 100,195 96,187" fill="#cfa040"/>

      <!-- ── Horizontal center band (y 95–105) — diamonds ── -->
      <polygon points="5,100  13,96  21,100  13,104"  fill="#cfa040"/>
      <polygon points="23,100 31,96  39,100  31,104"  fill="#cfa040"/>
      <polygon points="41,100 49,96  57,100  49,104"  fill="#cfa040"/>
      <polygon points="59,100 67,96  75,100  67,104"  fill="#cfa040"/>
      <polygon points="77,100 85,96  93,100  85,104"  fill="#cfa040"/>
      <polygon points="107,100 115,96 123,100 115,104" fill="#cfa040"/>
      <polygon points="125,100 133,96 141,100 133,104" fill="#cfa040"/>
      <polygon points="143,100 151,96 159,100 151,104" fill="#cfa040"/>
      <polygon points="161,100 169,96 177,100 169,104" fill="#cfa040"/>
      <polygon points="179,100 187,96 195,100 187,104" fill="#cfa040"/>

      <!-- ── Corner tick marks where bands meet panels ── -->
      <rect x="92" y="92" width="16" height="16" fill="#120b04" stroke="#cfa040" stroke-width="1"/>

    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#fiji)"/>
</svg>
